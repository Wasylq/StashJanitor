name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            binary="stash-janitor"
            archive="stash-janitor-${VERSION}-${GOOS}-${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              binary="stash-janitor.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "dist/${binary}" ./cmd/stash-janitor

            # Package as tar.gz (or zip for Windows)
            cd dist
            if [ "$GOOS" = "windows" ]; then
              zip "${archive}.zip" "${binary}"
            else
              tar czf "${archive}.tar.gz" "${binary}"
            fi
            rm "${binary}"
            cd ..
          done

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            Download the binary for your platform, extract, and run:

            ```sh
            # Linux (amd64)
            tar xzf stash-janitor-${{ github.ref_name }}-linux-amd64.tar.gz
            chmod +x stash-janitor
            ./stash-janitor config init

            # macOS (Apple Silicon)
            tar xzf stash-janitor-${{ github.ref_name }}-darwin-arm64.tar.gz
            chmod +x stash-janitor
            ./stash-janitor config init
            ```

            Or build from source:
            ```sh
            go install github.com/Wasylq/StashJanitor/cmd/stash-janitor@${{ github.ref_name }}
            ```
